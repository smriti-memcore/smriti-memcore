name: Publish to PyPI & MCP Registry

on:
  push:
    branches: [ "main" ] # Triggers on every push to main

jobs:
  publish:
    # Avoid running on version bump commits created by this workflow
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication (PyPI trusted publisher + MCP Registry)
      contents: write # Required to commit, push version bumps, and push tags

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Fetch all history to push commits/tags properly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      ### ── Increment Version ─────────────────────────────────────

      - name: Bump version
        id: version_bump
        run: |
          NEW_VERSION=$(python scripts/bump_version.py | grep "Bumped pyproject.toml to" | awk '{print $NF}')
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New Version: $NEW_VERSION"

      - name: Commit and push version bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml server.json
          git commit -m "Bump version to ${{ steps.version_bump.outputs.version }} [skip ci]"
          git push origin main

      - name: Tag release
        run: |
          git tag v${{ steps.version_bump.outputs.version }}
          git push origin v${{ steps.version_bump.outputs.version }}

      ### ── Build & publish to PyPI ──────────────────────────────

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Configure at: https://pypi.org/manage/project/smriti-memcore/settings/publishing/

      ### ── Publish to MCP Registry ─────────────────────────────

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
